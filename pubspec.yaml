name: actual_phone_state
description: Flutter plugin to get the current phone call state on Android and iOS.
version: 0.0.1
homepage: https://github.com/patratiip/actual_phone_state
repository: https://github.com/patratiip/actual_phone_state
issue_tracker: https://github.com/patratiip/actual_phone_state/issues

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.example.actual_phone_state
        pluginClass: ActualPhoneStatePlugin
      ios:
        pluginClass: ActualPhoneStatePlugin
